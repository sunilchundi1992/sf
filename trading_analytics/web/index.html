<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Analytics — Pure Quant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js" charset="utf-8"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-grid.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/styles/ag-theme-quartz.css" />
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31.3.2/dist/ag-grid-community.min.js"></script>
  <style>
    body { background:#0b0f17; color:#e5e7eb; font-family:ui-sans-serif,system-ui,sans-serif; }
    .card { background:#131927; border:1px solid #1f2937; border-radius:14px; }
    .chart { background:#131927; border:1px solid #1f2937; border-radius:14px; padding:8px; }
    .bull { color:#22c55e; } .bear { color:#ef4444; } .neutral { color:#9ca3af; }
    .badge-bull { background:rgba(34,197,94,.15); color:#22c55e; }
    .badge-bear { background:rgba(239,68,68,.15); color:#ef4444; }
    .badge-neutral { background:rgba(156,163,175,.15); color:#9ca3af; }
    .pulse { animation:pulse 1.2s ease-in-out; }
    @keyframes pulse { 0%{background:#1d4ed833;} 100%{background:transparent;} }
    .ag-theme-quartz { --ag-background-color:#131927; --ag-foreground-color:#e5e7eb;
      --ag-header-background-color:#0f1623; --ag-border-color:#1f2937;
      --ag-odd-row-background-color:#0f1623; --ag-row-hover-color:#1b2536; }
  </style>
</head>
<body class="p-4 md:p-6">
  <header class="flex items-center justify-between mb-5">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">Trading Analytics <span class="text-blue-400">Pure Quant</span></h1>
      <p class="text-sm text-gray-400">Live OI · PCR · Max Pain · Volume — market-understanding engine</p>
    </div>
    <div class="flex items-center gap-3 text-sm">
      <span id="conn" class="px-3 py-1 rounded-full badge-neutral">connecting…</span>
      <span id="clock" class="text-gray-400"></span>
      <button id="refreshBtn" class="px-3 py-1 rounded-lg bg-blue-600 hover:bg-blue-500 text-white">Refresh</button>
    </div>
  </header>

  <!-- Summary cards -->
  <section id="cards" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-6 gap-3 mb-6"></section>

  <div class="grid grid-cols-1 xl:grid-cols-3 gap-4 mb-6">
    <!-- Market understanding points -->
    <section class="card p-4 xl:col-span-1">
      <h2 class="font-semibold mb-3 text-lg">Market Understanding</h2>
      <div id="understanding" class="space-y-3 max-h-[640px] overflow-y-auto pr-1"></div>
    </section>

    <!-- Charts -->
    <section class="xl:col-span-2 grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="chart"><div id="chart_spot_oi" style="height:260px"></div></div>
      <div class="chart"><div id="chart_spot_pcr" style="height:260px"></div></div>
      <div class="chart"><div id="chart_spot_maxpain" style="height:260px"></div></div>
      <div class="chart"><div id="chart_spot_changeoi" style="height:260px"></div></div>
      <div class="chart"><div id="chart_oi_growth" style="height:260px"></div></div>
      <div class="chart"><div id="chart_vol_growth" style="height:260px"></div></div>
    </section>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-6">
    <div class="chart"><div id="chart_pcr_trend" style="height:280px"></div></div>
    <div class="chart"><div id="chart_oi_heatmap" style="height:280px"></div></div>
  </div>

  <div class="grid grid-cols-1 xl:grid-cols-2 gap-4 mb-6">
    <div class="chart"><div id="chart_inst_timeline" style="height:280px"></div></div>
    <div class="chart"><div id="chart_trend_dash" style="height:280px"></div></div>
  </div>

  <!-- Option chain grid -->
  <section class="card p-4 mb-10">
    <h2 class="font-semibold mb-3 text-lg">Option Chain (OI Walls)</h2>
    <div id="chainGrid" class="ag-theme-quartz" style="height:340px;width:100%"></div>
  </section>

  <script src="/static/app.js"></script>
</body>
</html>
